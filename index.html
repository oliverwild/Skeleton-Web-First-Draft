    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Lato:ital,wght@0,400;0,500;0,700;1,400&display=swap" rel="stylesheet">

    <link rel="apple-touch-icon" href="images/apple-touch-icon.png" />
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Studio Skelton" />
    <meta property="og:image" content="https://oliverwild.github.io/Skelton-Web-First-Draft/images/og-image.png" />

    <link rel="stylesheet" href="style.css" />
</head>

<body class="home">
    <main class="center-content">
        <img class="logo-img" src="images/logo.png" alt="Studio Skelton" width="1600" height="595" />
        <p class="tagline">Hospitality &amp; residential interior design</p>
    </main>

    <nav class="main-nav">
        <a href="about.html">About</a>
        <span>|</span>
        <a href="https://www.instagram.com/studioskelton/" target="_blank" rel="noopener noreferrer">Instagram</a>
        <span>|</span>
        <a href="mailto:info@studioskelton.com">Contact</a>
    </nav>

    <footer class="footer-symbol">
        <a href="index.html">
            <img src="images/symbol.png" alt="Home" width="34" height="34">
        </a>
    </footer>

    <script>
    // Soft fade-out when navigating between pages
    document.addEventListener('click', function (e) {
        var a = e.target.closest('a');
        if (!a || a.target === '_blank') return;
        var href = a.getAttribute('href') || '';
        if (href.startsWith('mailto:') || href.startsWith('#') || href.startsWith('http')) return;
        e.preventDefault();
        document.body.classList.add('page-exit');
        setTimeout(function () { window.location.href = href; }, 340);
    });
    // Restore if page is revived from the back/forward cache
    window.addEventListener('pageshow', function (e) {
        if (e.persisted) document.body.classList.remove('page-exit');
    });
    </script>
</body>
</html>
